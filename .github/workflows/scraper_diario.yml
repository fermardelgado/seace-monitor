name: Scraper SEACE Diario
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests
      - name: Ejecutar scraper SEACE
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python scraper.py
      - name: Subir datos.json actualizado a GitHub
        run: |
          git config user.name "LicitAlertas Bot"
          git config user.email "bot@licitalertas.com"
          git add datos.json
          git diff --staged --quiet || git commit -m "Actualizar datos SEACE - $(date +'%Y-%m-%d %H:%M')"
          git push origin HEAD:main --force
